name: Update Stock

on:
  schedule:
    # кожні 7 годин
    - cron: '0 */7 * * *'
  workflow_dispatch: # щоб можна було запускати вручну

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests

      - name: Save Google Service Account
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT }}" > service_account.json

      - name: Run update_stock
        env:
          XML_URL: ${{ secrets.XML_URL }}
        run: |
          python update_stock.py
